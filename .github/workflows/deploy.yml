name: OIDC Cloud Run Deployment

on:
  push:
    branches: [ main ]

permissions:
  contents: 'read'
  id-token: 'write' # Mandatory for the handshake

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          # Constructed using your Project Number and Pool ID
          workload_identity_provider: 'projects/803095609412/locations/global/workloadIdentityPools/aaa-github-pool/providers/github-provider'
          service_account: '803095609412-compute@developer.gserviceaccount.com'
          project_id: 'genai-apps-25'
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'
        with:
          install_components: 'alpha'

      - name: 'Verify Authentication'
        run: 'gcloud auth list'
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli

      - name: Link Hub Extension
        run: |
          mkdir -p ~/.gemini .agentfarm/
          echo '{"projects":{}}' > ~/.gemini/projects.json
          echo "${{ steps.app-token.outputs.token }}" | gemini extensions link ./extensions/agent-farm --consent

      - name: Gemini Security Scan
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GOOGLE_GENAI_USE_VERTEXAI: 'true'
          GOOGLE_CLOUD_LOCATION: ${{ secrets.GOOGLE_CLOUD_LOCATION || 'global' }}
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT || vars.GCP_PROJECT_ID }}
        run: |
          gemini extensions install https://github.com/gemini-cli-extensions/security --consent
          gemini -p "/security:analyze" -y

      - name: Run PR Auto-Review Command
        if: github.event.pull_request.number
        env:
          GITHUB_PERSONAL_ACCESS_TOKEN: ${{ secrets.G_PAT_TOKEN }}
          GH_TOKEN: ${{ secrets.G_PAT_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.G_PAT_TOKEN }}
          GOOGLE_GENAI_USE_VERTEXAI: 'true'
          GOOGLE_CLOUD_LOCATION: ${{ secrets.GOOGLE_CLOUD_LOCATION || 'global' }}
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT || vars.GCP_PROJECT_ID }}
        run: |
          gemini -p "@reviewer pull_request: ${{ github.event.pull_request.number }} max_reviews: 3" -y

      - name: 'GCP PII Scan'
        run: |
          echo "Scanning for PII (Email, Phone, etc.)..."
          # Scan common files in the repository for sensitive info types using Cloud DLP alpha
          find . -maxdepth 2 -not -path '*/.*' -type f \( -name "*.tf" -o -name "*.yml" -o -name "*.md" -o -name "*.sh" \) | while read file; do
            echo "Scanning $file..."
            CONTENT=$(cat "$file")
            if [ ! -z "$CONTENT" ]; then
              gcloud alpha dlp text inspect --info-types=EMAIL_ADDRESS,PHONE_NUMBER,LOCATION --content="$CONTENT" --format="json"
            fi
          done

      # - name: 'Deploy to Cloud Run'
      #   run: |
      #     gcloud run deploy e2e-agent-service \
      #       --image us-central1-docker.pkg.dev/genai-apps-25/adk/fast-api-fe:latest \
      #       --region us-central1 \
      #       --platform managed \
      #       --project genai-apps-25 \
      #       --iap
